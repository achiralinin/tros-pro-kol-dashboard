name: Auto Update TROS PRO Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Actual-Use platform (tiktok/facebook) — optional'
        required: false
        default: ''
      actual_use:
        description: 'Actual-Use amount (THB) — optional'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install yt-dlp
        run: pip install -U yt-dlp && yt-dlp --version
      - name: Scrape stats
        run: python3 scripts/scraper.py scrape_results.json
      - name: Inject into dashboard
        run: python3 scripts/update_dashboard.py scrape_results.json index.html
      - name: Update Actual-Use (optional)
        if: ${{ github.event.inputs.actual_use != '' && github.event.inputs.platform != '' }}
        run: python3 scripts/update_actual_use.py "${{ github.event.inputs.platform }}" "${{ github.event.inputs.actual_use }}" index.html
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scrape_results.json
          git diff --staged --quiet || git commit -m "Auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
